      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#C48A00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Oscar statuette silhouette -->
  <!-- Head -->
