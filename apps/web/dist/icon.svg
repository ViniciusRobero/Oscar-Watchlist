  <!-- Left arm -->
  <ellipse cx="158" cy="210" rx="19" ry="52" fill="#0d0d1a"/>

  <!-- Right arm -->
  <ellipse cx="354" cy="210" rx="19" ry="52" fill="#0d0d1a"/>

  <!-- Lower body -->
  <rect x="207" y="289" width="98" height="72" rx="6" fill="#0d0d1a"/>

  <!-- Sword crossguard -->
  <rect x="213" y="357" width="86" height="15" rx="4" fill="#0d0d1a"/>

  <!-- Sword blade -->
  <rect x="248" y="370" width="16" height="82" rx="3" fill="#0d0d1a"/>

  <!-- Base step -->
